name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.27.76.114
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: /home/ubuntu/deploy-frontend.sh
